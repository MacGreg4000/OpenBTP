services:

  # ================================
  # Base de données MariaDB
  # ================================
  openbtp-db:
    image: mariadb:10.11
    container_name: openbtp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: openbtp
      MYSQL_USER: openbtp_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - openbtp-db-data:/var/lib/mysql
    networks:
      - openbtp-network
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h 127.0.0.1 -P 3306 -u openbtp_user -p$$MYSQL_PASSWORD -e 'SELECT 1' 2>/dev/null || exit 1"]
      start_period: 120s
      interval: 15s
      timeout: 5s
      retries: 10

  # ================================
  # Application Next.js
  # ================================
  openbtp-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openbtp-web
    restart: unless-stopped
    depends_on:
      openbtp-db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://openbtp_user:${DB_PASSWORD}@openbtp-db:3306/openbtp
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-${NEXTAUTH_URL}}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Service PDF (browserless sur le NAS)
      PDF_SERVICE_URL: ${PDF_SERVICE_URL:-http://nas-host:3001}
      PDF_SERVICE_PROVIDER: ${PDF_SERVICE_PROVIDER:-browserless}
      # Ollama RAG (sur le NAS)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://nas-host:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3:mini}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text:latest}
      # Email (optionnel)
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
    extra_hosts:
      # Permet d'accéder aux services du NAS (PDF, Ollama) depuis le container
      - "nas-host:host-gateway"
    volumes:
      # Fichiers uploadés persistants (chemin configurable via UPLOADS_PATH dans .env)
      # Par défaut ./uploads/ est créé automatiquement à côté du docker-compose.yml
      - ${UPLOADS_PATH:-./public/uploads}:/app/public/uploads
      # Fiches techniques (PDFs)
      - ./public/fiches-techniques:/app/public/fiches-techniques
      # Photos et fichiers par chantier
      - ./public/chantiers:/app/public/chantiers
      # Documents transmis
      - ./public/documents:/app/public/documents
      # Sauvegardes BDD persistantes
      - ${BACKUP_PATH:-./backups}:/app/backups
      # Dossier d'import SQL : si un .sql est présent ET la base est vide,
      # le container web l'importe automatiquement au premier démarrage.
      - ./init-db:/app/init-db
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - openbtp-network

  # ================================
  # phpMyAdmin (interface base de données)
  # Accessible sur http://NAS-IP:8081
  # ================================
  openbtp-pma:
    image: phpmyadmin:latest
    container_name: openbtp-pma
    restart: unless-stopped
    environment:
      PMA_HOST: openbtp-db
      PMA_PORT: 3306
    ports:
      - "8081:80"
    networks:
      - openbtp-network
    depends_on:
      openbtp-db:
        condition: service_healthy

networks:
  openbtp-network:
    driver: bridge

volumes:
  openbtp-db-data:
    driver: local
